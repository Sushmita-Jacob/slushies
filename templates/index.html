{% extends 'base.html' %}
{% block content %}

<h1>Welcome to Under The Weather!</h1>
<h3>Enter a city and country below.</h5>
<form method="POST" class="card border-0 p-3 shadow-sm">
    <div class="form-group">
        <input type="text" class="form-control" name="city" placeholder="Indianapolis">
    </div>
    <div class="form-group">
        <input type="text" class="form-control" name="country" placeholder="US">
    </div>
    <br>
    <div class="form-group">
        <button class="btn btn-info btn-block">Get Weather</button>
    </div>
</form>

{% endblock content %}
